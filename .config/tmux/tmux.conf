# change prefix from Ctrl+b to Ctrl+a (easier)
set -g default-shell /usr/bin/zsh

unbind C-b
set -g prefix C-a
bind C-a send-prefix

# split panes with | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# switch panes with Alt+arrow no prefix needed
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# start windows from 1 not 0
set -g base-index 1
set -g pane-base-index 1

# mouse support
set -g mouse on

# stop rename windows automatically
set-option -g allow-rename off

# bigger history
set -g history-limit 10000

# fix colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# remove delay on escape
set -sg escape-time 0

# ── STATUS BAR ──────────────────────────────────────────

# position
set -g status-position bottom
set -g status-interval 5

# colors
set -g status-style "bg=#1a1826,fg=#c0b8d4"

# left
set -g status-left "#[fg=#9d79d6,bold]⏾ #[fg=#c0b8d4]#S #[fg=#6e6a86]⟨"
set -g status-left-length 30

# right
set -g status-right "#[fg=#6e6a86]⟩ #[fg=#9d79d6] %H:%M #[fg=#6e6a86]⟨#[fg=#c0b8d4] %d %b#[fg=#6e6a86]⟩"
set -g status-right-length 40

# window tabs
set -g window-status-format "#[fg=#6e6a86] #I:#W "
set -g window-status-current-format "#[fg=#e0d8f0,bold] ⭒ #I:#W "

# pane borders
set -g pane-border-style "fg=#524f67"
set -g pane-active-border-style "fg=#9d79d6"

# ── VIM NAVIGATION ──────────────────────────────────────
# switch panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes with HJKL
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
